pre-commit:
  jobs:
    - name: beads
      run: BD_GIT_HOOK=1 bd hooks run pre-commit {args}
    - name: nixfmt
      glob: "*.nix"
      run: nixfmt --check {staged_files}
    - name: statix
      glob: "*.nix"
      run: 'for f in {staged_files}; do statix check "$f" || exit 1; done'
    - name: deadnix
      glob: "*.nix"
      run: deadnix --fail {staged_files}

prepare-commit-msg:
  jobs:
    - name: beads
      run: BD_GIT_HOOK=1 bd hooks run prepare-commit-msg {args}

post-checkout:
  jobs:
    - name: beads
      run: BD_GIT_HOOK=1 bd hooks run post-checkout {args}

post-merge:
  jobs:
    - name: beads
      run: BD_GIT_HOOK=1 bd hooks run post-merge {args}

pre-push:
  jobs:
    - name: beads
      run: BD_GIT_HOOK=1 bd hooks run pre-push {args}
